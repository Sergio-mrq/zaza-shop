<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZazaBox - Boutique Culturelle</title>
    <link rel="stylesheet" href="accueil.css">
    <script src="accueil.js" defer></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="logo">ZazaBox</div>
        <nav>
            <ul>
                <li><a href="#">Accueil</a></li>
                <li><a href="#">Boutique</a></li>
                <li><a href="#">À propos</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="icons">
            <i class="fas fa-shopping-cart"></i>
            <i class="fas fa-user"></i>
        </div>
    </header>
    
    <section class="highlight">
        <img src="flyers.png" alt="Exclusivité du mois">
        <div class="highlight-text">
            <h2>Exclusivité du mois !</h2>
            <p>Découvrez notre ZazaBox spéciale avec des produits uniques !</p>
            <button>Acheter maintenant</button>
        </div>
    </section>
    
    <section class="products">
        <h2>Nos Produits</h2>
        <div class="product-list">
            <div class="product">
                <img src="produit1.jpg" alt="Produit 1">
                <h3>Produit 1</h3>
                <p>Prix: 24.99€</p>
                <button>Ajouter au panier</button>
            </div>
            <div class="product">
                <img src="produit2.jpg" alt="Produit 2">
                <h3>Produit 2</h3>
                <p>Prix: 19.99€</p>
                <button>Ajouter au panier</button>
            </div>
        </div>
    </section>
    
    <footer>
        <p>&copy; 2025 ZazaBox - Tous droits réservés</p>
    </footer>
</body>
</html>
